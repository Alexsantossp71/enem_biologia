<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Capítulo 9 - Jogo da Memória</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background:#f7f7f7; }
    .wrap { max-width: 700px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .card { width: 100%; height: 90px; border:1px solid #ddd; border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; background:#fff; }
    .card.flipped { background:#4f46e5; color:#fff; transform: rotateY(180deg); }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Capítulo 9 - Jogo da Memória</h2>
    <div class="grid" id="grid-memory">
      <!-- 8 cartas (4 pares) -->
      <div class="card" data-id="A">A</div>
      <div class="card" data-id="B">B</div>
      <div class="card" data-id="C">C</div>
      <div class="card" data-id="D">D</div>
      <div class="card" data-id="A2" style="visibility:hidden"></div>
      <div class="card" data-id="B2" style="visibility:hidden"></div>
      <div class="card" data-id="C2" style="visibility:hidden"></div>
      <div class="card" data-id="D2" style="visibility:hidden"></div>
    </div>
    <p><a href="cap9_biologia.html">Voltar</a> | <a href="cap9_quiz.html">Quiz</a> | <a href="cap9_flashcards.html">Flashcards</a></p>
  </div>
  <script>
    const grid = document.getElementById('grid-memory');
    let first = null, second = null; let lock = false;
    grid.addEventListener('click', function(e){
      if (lock) return;
      const t = e.target.closest('.card');
      if (!t) return;
      if (t.style.visibility === 'hidden') return;
      t.classList.add('flipped');
      if (!first) { first = t; return; }
      second = t;
      lock = true;
      setTimeout(() => {
        if (first.dataset.id[0] === second.dataset.id[0] || first.textContent === second.textContent) {
          // match
          first.style.visibility = 'hidden';
          second.style.visibility = 'hidden';
        } else {
          first.classList.remove('flipped');
          second.classList.remove('flipped');
        }
        first = null; second = null; lock = false;
      }, 400);
    });
  </script>
</body>
</html>

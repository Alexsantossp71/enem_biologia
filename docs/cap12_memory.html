<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Capítulo 12 - Jogo da Memória</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background:#f7f7f7; }
    .wrap { max-width: 700px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .card { width:100%; height: 100px; background:#fff; border:1px solid #ddd; border-radius:6px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="cap12_biologia.html">Voltar</a>
    <h1>Capítulo 12 - Jogo da Memória</h1>
    <div class="grid" id="grid-memory">
      <div class="card">A</div><div class="card">A</div><div class="card">B</div><div class="card">B</div>
      <div class="card">C</div><div class="card">C</div><div class="card">D</div><div class="card">D</div>
    </div>
    <p><a href="https://wordwall.net/pt-br/community/jogos-da-memória" target="_blank">Jogar memória no WordWall</a></p>
  </div>
  <script>document.getElementById('grid-memory').addEventListener('click', (e)=>{ if(e.target.classList.contains('card')) e.target.classList.toggle('flipped'); });</script>
</body>
</html>

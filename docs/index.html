<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trilhas de Biologia – Vanilla</title>
  <style>
    :root { --bg: #f5f7fb; --card: #fff; --border: #e5e7eb; --text: #111827; --muted: #6b7280; --accent: #0ea5e9; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); }
    header.site { padding: 16px 20px; background: #fff; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
    header.site h1 { margin: 0 0 6px; font-size: 1.2rem; }
    #search { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; }
    main.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; padding: 20px; }
    .card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; gap: 6px; cursor: pointer; transition: transform .15s ease, box-shadow .2s; }
    .card:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.08); }
    .card-title { font-weight: 600; font-size: 15px; }
    .card-desc { font-size: 12.5px; color: var(--muted); min-height: 28px; }
    .progress-bar { height: 8px; background: #f1f5f9; border-radius: 6px; overflow: hidden; }
    .progress-bar .progress { height: 100%; background: linear-gradient(90deg, #22c55e, #16a34a); width: 0%; }
    /* Chips de temas */
    .chip { background: #eef2ff; color: #3730a3; border-radius: 999px; padding: 4px 8px; font-size: 11px; display: inline-block; }
    /* Modal */
    #modal { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,.5); padding: 20px; }
    #modal[aria-hidden="false"] { display: flex; }
    .modal-content { background: #fff; border-radius: 12px; padding: 20px; max-width: 640px; width: 100%; position: relative; }
    .close { position: absolute; top: 8px; right: 8px; border: none; background: transparent; font-size: 14px; cursor: pointer; }
    #modal-title { margin: 0 0 6px; font-size: 1.25rem; }
    #modal-desc { color: #374151; margin: 0 0 6px; }
    #modal-themes { margin: 6px 0 12px; padding-left: 20px; }
    #modal-duration { margin: 0 0 6px; }
    #modal-progress { display: block; height: 8px; width: 0%; background: #e5e7eb; border-radius: 6px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 8px; }
    .btn { padding: 8px 12px; border-radius: 6px; border: 1px solid #d1d5db; background: #fff; cursor: pointer; }
    .btn:hover { background: #f3f4f6; }
    @media (max-width: 600px) {
      main.grid { padding: 12px; grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="site">
    <h1>Trilhas de Biologia</h1>
    <input id="search" type="search" placeholder="Buscar trilhas..." aria-label="Buscar trilhas">
  </header>
  <main class="grid" id="grid"></main>

  <section id="modal" aria-hidden="true" role="dialog" aria-label="Detalhes da trilha" class="modal" >
    <div class="modal-content">
      <button id="close-modal" class="close" aria-label="Fechar">✕</button>
      <h2 id="modal-title"></h2>
      <p id="modal-desc"></p>
      <div id="modal-themes"></div>
      <p><strong>Duração estimada:</strong> <span id="modal-duration"></span></p>
      <div class="progress-bar" aria-label="Progresso atual">
        <span id="modal-progress" style="width:0%"></span>
      </div>
      <div class="modal-actions">
        <button id="start-btn" class="btn">Iniciar trilha</button>
        <button id="next-btn" class="btn">Proximo</button>
      </div>
    </div>
  </section>

  <script>
    // Dados: 13 trilhas de biologia (ASCII)
    const tracks = [
      { id: 1, title: "Biologia (A Ciencia como ciencia, origens do universo e seres vivos)", description: "Conceitos basicos sobre celulas, organelas e biomoleculas.", duration: "20-35 min", themes: ["Celulas","Biomoleculas","Organelas"] },
      { id: 2, title: "Moleculas e Celulas", description: "Principios basicos de moleculas e celulas.", duration: "25-40 min", themes: ["Celulas","Moleculas","Organelas"] },
      { id: 3, title: "Principais Tecidos Animais e Vegetais", description: "Estruturas de tecidos em animais e plantas.", duration: "30-45 min", themes: ["Tecidos","Animais","Vegetais"] },
      { id: 4, title: "Aspectos Bioquimicos das Estruturas Celulares", description: "Resumo bioquimico de estruturas celulares.", duration: "20-40 min", themes: ["Bioquimica","Celulas","Organelas"] },
      { id: 5, title: "Aspectos Gerais do Metabolismo Celular", description: "Metabolismo e vias energeticas celulares.", duration: "20-35 min", themes: ["Metabolismo","Energia","Vias"] },
      { id: 6, title: "Codificacao da Informacao Genetica", description: "Codigo genetico e expresao genetica.", duration: "25-40 min", themes: ["DNA","RNA","Proteinas"] },
      { id: 7, title: "Identidade dos Seres Vivos", description: "Caracteristicas basicas que definem seres vivos.", duration: "30-45 min", themes: ["Vida","Classificacao","Organismos"] },
      { id: 8, title: "Diversidade dos seres vivos (Focado em Botanica e Animais)", description: "Diversidade entre plantas e animais.", duration: "20-35 min", themes: ["Botanica","Zoologia","Diversidade"] },
      { id: 9, title: "Morfologia e Fisiologia Animal Comparada", description: "Morfologia e funcao de animais comparada.", duration: "25-40 min", themes: ["Morfologia","Fisiologia","Comparacao"] },
      { id: 10, title: "Genetica", description: "Heranca, cruzamentos e mapeamento genetico.", duration: "20-35 min", themes: ["Heranca","Cruzamentos","Mapa genetico"] },
      { id: 11, title: "Evolucao", description: "Processos evolutivos e evidencias.", duration: "30-45 min", themes: ["Evolucao","Selecao","Adaptação"] },
      { id: 12, title: "Ecologia", description: "Ecologia de populacoes e interacoes ecologicas.", duration: "20-40 min", themes: ["Ecossistemas","Interacao","Cadeias alimentares"] },
      { id: 13, title: "Qualidade de Vida", description: "Conceitos de saude e bem-estar biologico.", duration: "15-30 min", themes: ["Saude","Vida","Bem-estar"] },
      { id: 14, title: "Capitulo 1: Ciencia da Biologia", description: "Conteudo do Capitulo 1", duration: "60-90 min", themes: ["Capitulo1","Biologia"] },
      { id: 15, title: "Capitulo 2: Organizacao Celular", description: "Conteudo do Capítulo 2 sobre organização básica das células", duration: "60-90 min", themes: ["Células","Citosol","Organelas"] }
    ];

    const PROGRESS_KEY = "enem_biologia_progress"; // localStorage key
    let progress = {};
    let currentTrackId = null;

    function loadProgress() {
      try {
        const raw = localStorage.getItem(PROGRESS_KEY);
        progress = raw ? JSON.parse(raw) : {};
      } catch {
        progress = {};
      }
    }
    function saveProgress() {
      localStorage.setItem(PROGRESS_KEY, JSON.stringify(progress));
    }
    function getProgress(id) {
      return progress[id] ?? 0;
    }
    function setProgress(id, value) {
      const v = Math.max(0, Math.min(100, value ?? 0));
      progress[id] = v;
      saveProgress();
      updateCardProgress(id);
      if (currentTrackId === id) updateModalProgress();
    }
    function updateCardProgress(id) {
      const card = document.querySelector(`.card[data-id="${id}"]`);
      if (!card) return;
      const bar = card.querySelector(".progress-bar .progress");
      const p = getProgress(id);
      if (bar) bar.style.width = p + "%";
    }
    function updateModalProgress() {
      const p = getProgress(currentTrackId);
      const el = document.getElementById("modal-progress");
      el.style.width = p + "%";
    }

    // Renderização
    function renderGrid() {
      const grid = document.getElementById("grid");
      grid.innerHTML = "";
      tracks.forEach(t => {
        const p = getProgress(t.id);
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.id = t.id;
        card.innerHTML = `
          <div class="card-title">${t.title}</div>
          <div class="card-desc">${t.description}</div>
          <div class="themes" aria-label="Temas da trilha" style="display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 6px;">
            ${ (t.themes || []).slice(0,3).map(th => `<span class="chip">${th}</span>`).join('') }
          </div>
          <div class="progress-bar" aria-label="Progresso da trilha">
            <div class="progress" style="width:${p}%;"></div>
          </div>
        `;
        card.addEventListener("click", () => openModal(t));
        grid.appendChild(card);
      });
    }
    function openModal(track) {
      currentTrackId = track.id;
      document.getElementById("modal-title").textContent = track.title;
      document.getElementById("modal-desc").textContent = track.description;
      const divThemes = document.getElementById("modal-themes");
      divThemes.innerHTML = "";
      (track.themes || []).forEach(th => {
        const span = document.createElement("span");
        span.className = "chip";
        span.textContent = th;
        divThemes.appendChild(span);
      });
      document.getElementById("modal-duration").textContent = track.duration;
      updateModalProgress();
      const modal = document.getElementById("modal");
      modal.style.display = "flex";
      modal.setAttribute("aria-hidden", "false");
    }
    function closeModal() {
      const modal = document.getElementById("modal");
      modal.style.display = "none";
      modal.setAttribute("aria-hidden", "true");
      currentTrackId = null;
    }

    // Helpers: map track -> lesson page path (capX_biologia.html if exists)
    function mapTrackToPage(id) {
      const map = {
        1: "/enem_biologia/cap1_biologia.html",
        2: "/enem_biologia/cap2_biologia.html",
        3: "/enem_biologia/cap3_biologia.html"
      };
      if (map[id]) return map[id];
      // fallback: try implicit naming (capN_biologia.html)
      const guess = "/enem_biologia/cap" + id + "_biologia.html";
      return guess;
    }

    // Event handlers para o modal
    document.getElementById("start-btn").addEventListener("click", () => {
      const tpath = mapTrackToPage(currentTrackId);
      if (tpath) {
        fetch(tpath, { method: 'HEAD' })
          .then(res => {
            if (res.ok) {
              window.location.href = tpath;
            } else {
              if (currentTrackId != null) setProgress(currentTrackId, 0);
              renderGrid();
              updateModalProgress();
            }
          })
          .catch(() => {
            if (currentTrackId != null) setProgress(currentTrackId, 0);
            renderGrid();
            updateModalProgress();
          });
      } else {
        if (currentTrackId != null) setProgress(currentTrackId, 0);
        renderGrid();
        updateModalProgress();
      }
    });
    document.getElementById("next-btn").addEventListener("click", () => {
      if (currentTrackId != null) setProgress(currentTrackId, getProgress(currentTrackId) + 25);
      renderGrid();
      updateModalProgress();
    });
    document.getElementById("close-modal").addEventListener("click", closeModal);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeModal();
    });

    // Busca
    document.getElementById("search").addEventListener("input", (e) => {
      const q = e.target.value.toLowerCase();
      document.querySelectorAll(".card").forEach(card => {
        const id = parseInt(card.dataset.id, 10);
        const t = tracks.find(x => x.id === id);
        const text = (t.title + " " + t.description + " " + (t.themes || []).join(" ")).toLowerCase();
        card.style.display = text.includes(q) ? "block" : "none";
      });
    });

    // Init
    loadProgress();
    renderGrid();
    // Fechar modal com click fora do conteúdo (opcional)
    document.getElementById("modal").addEventListener("click", (e) => {
      if (e.target.id === "modal") closeModal();
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Capítulo 10 - Quiz</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background:#f7f7f7; }
    .container { max-width: 700px; margin: 0 auto; background:#fff; padding: 20px; border-radius: 8px; }
    .question { margin: 12px 0; }
  </style>
</head>
<body>
  <div class="container">
    <a href="cap10_biologia.html">Voltar</a>
    <h1>Capítulo 10 - Quiz</h1>
    <form id="quiz-form">
      <div class="question"><p>1) Qual é a base da herança genética?</p><label><input type="radio" name="q1" value="DNA"> DNA</label></div>
      <div class="question"><p>2) Qual molécula carrega a informação genética?</p><label><input type="radio" name="q2" value="DNA"> DNA</label></div>
      <div class="question"><p>3) Qual é a unidade básica da herança?</p><label><input type="radio" name="q3" value="Gene"> Gene</label></div>
      <button type="button" id="check" class="btn">Verificar</button>
    </form>
    <div id="result" style="margin-top:8px;font-weight:bold;"></div>
  </div>
  <script>
    document.getElementById('check').addEventListener('click', () => {
      let score = 0;
      const a = document.querySelector('input[name="q1"]:checked')?.value;
      const b = document.querySelector('input[name="q2"]:checked')?.value;
      const c = document.querySelector('input[name="q3"]:checked')?.value;
      if (a === 'DNA') score++;
      if (b === 'DNA') score++;
      if (c === 'Gene') score++;
      document.getElementById('result').textContent = `Pontuação: ${score} / 3`;
    });
  </script>
</body>
</html>

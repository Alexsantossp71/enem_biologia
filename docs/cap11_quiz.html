<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Capítulo 11 - Quiz</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background:#f7f7f7; }
    .container { max-width: 700px; margin: 0 auto; background:#fff; padding: 20px; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="cap11_biologia.html">Voltar</a>
    <h1>Capítulo 11 - Quiz</h1>
    <form id="quiz-form">
      <div class="question"><p>1) Qual é a força motriz da evolução?</p><label><input type="radio" name="q1" value="Seleção natural"> Seleção natural</label></div>
      <div class="question"><p>2) O que é deriva genética?</p><label><input type="radio" name="q2" value="Mudanças aleatórias na frequência de alelos"> Mudanças aleatórias na frequência de alelos</label></div>
      <div class="question"><p>3) Qual é uma evidência da evolução?</p><label><input type="radio" name="q3" value="Fósseis"> Fósseis</label></div>
      <button type="button" id="check" class="btn">Verificar</button>
    </form>
    <div id="result" style="margin-top:8px;font-weight:bold;"></div>
  </div>
  <script>
    document.getElementById('check').addEventListener('click', () => {
      let score = 0; const a = document.querySelector('input[name="q1"]:checked')?.value; const b = document.querySelector('input[name="q2"]:checked')?.value; const c = document.querySelector('input[name="q3"]:checked')?.value; if (a==='Seleção natural') score++; if (b==='Mudanças aleatórias na frequência de alelos') score++; if (c==='Fósseis') score++; document.getElementById('result').textContent = `Pontuação: ${score} / 3`;
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Capítulo 9 - Flashcards</title>
  <meta name="description" content="Flashcards do Capítulo 9: Morfologia e Fisiologia Animal. Revise conceitos de glicólise, mitocôndria, ribossomos e cloroplastos.">
  <link rel="canonical" href="./cap9_flashcards.html">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <style>
    :root {
      --primary-color: #10b981;
      --primary-dark: #059669;
      --accent-color: #4f46e5;
      --bg-color: #f7f7f7;
      --card-bg: #fff;
      --border-color: #e5e7eb;
      --text-color: #111;
      --radius: 8px;
    }
    body { font-family: Arial, sans-serif; background:var(--bg-color); padding:20px; }
    .wrap { max-width: 800px; margin: 0 auto; background: var(--card-bg); padding: 20px; border-radius: var(--radius); }
    .card { width: 120px; height: 180px; border:1px solid var(--border-color); border-radius:var(--radius); display:inline-block; margin:8px; perspective:1000px; }
    .inner { position:relative; width:100%; height:100%; transform-style:preserve-3d; transition: transform .6s; }
    .front, .back { position:absolute; width:100%; height:100%; backface-visibility:hidden; display:flex; align-items:center; justify-content:center; padding:8px; box-sizing:border-box; border-radius:var(--radius); }
    .front { background:var(--accent-color); color:white; }
    .back { background:#f8fafc; color:var(--text-color); transform: rotateY(180deg); }
    .inner.flipped { transform: rotateY(180deg); }
    button.flashcard-btn { background: none; border: none; padding: 0; cursor: pointer; }
    button.flashcard-btn:focus-visible { outline: 2px solid var(--primary-color); outline-offset: 2px; }
    button.flashcard-btn:focus-visible .card { box-shadow: 0 0 0 2px var(--primary-color); }
    a { color: var(--primary-color); text-decoration: none; }
    a:focus-visible { outline: 2px solid var(--primary-color); outline-offset: 2px; }
    #skip-link { position: absolute; top: -40px; left: 0; background: var(--primary-color); color: white; padding: 8px; z-index: 100; text-decoration: none; }
    #skip-link:focus { top: 0; }
  </style>
</head>
<body>
  <a href="#main-content" id="skip-link">Pular para conteúdo principal</a>
  <main id="main-content">
    <nav aria-label="Navegação do capítulo">
      <a href="cap9_biologia.html">← Voltar para conteúdo</a>
    </nav>
    <div class="wrap">
      <h1>Capítulo 9 - Flashcards</h1>
      <p>Clique nos cartões para revelar as respostas.</p>
      <div class="cards">
        <button class="flashcard-btn" onclick="flip(this)" aria-label="Glicólise - Clique para ver a resposta">
          <div class="card"><div class="inner"><div class="front">Glicólise</div><div class="back">Quebra a glicose para gerar energia</div></div></div>
        </button>
        <button class="flashcard-btn" onclick="flip(this)" aria-label="Mitocôndria - Clique para ver a resposta">
          <div class="card"><div class="inner"><div class="front">Mitocôndria</div><div class="back">Produz ATP na respiração celular</div></div></div>
        </button>
        <button class="flashcard-btn" onclick="flip(this)" aria-label="Ribossomos - Clique para ver a resposta">
          <div class="card"><div class="inner"><div class="front">Ribossomos</div><div class="back">Síntese de proteínas</div></div></div>
        </button>
        <button class="flashcard-btn" onclick="flip(this)" aria-label="Cloroplastos - Clique para ver a resposta">
          <div class="card"><div class="inner"><div class="front">Cloroplastos</div><div class="back">Fotossíntese em plantas</div></div></div>
        </button>
      </div>
    </div>
  </main>
  <script>
    function flip(btn){ btn.querySelector('.inner').classList.toggle('flipped'); }
  </script>
</body>
</html>
